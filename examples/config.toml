[browser]
default_engine = "ampb-gecko"
state_dir = ".ampb"
# Optional. Leave unset to use AMPB_BROWSER_BIN or the default /tmp build output.
runtime_path = ""

[transports.tor]
enabled = true
mode = "adopt-or-prompt-manage"
# Optional. Used when AMPB should manage a local Tor binary.
binary_path = ""

[transports.i2p]
enabled = true
mode = "adopt-or-prompt-manage"

[transports.ipfs]
enabled = true
mode = "adopt-or-prompt-manage"

[transports.reticulum]
enabled = false

[profiles]
isolate_by_transport = true
